name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Minimal permissions — principle of least privilege.
# contents:read     — checkout the code
# pull-requests:write — post review comments
# statuses:write    — set commit status checks (shown in PR checks UI)
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: AI Code Review
  # Reviews the PR diff for correctness, style, and general security issues.
  # Posts a PR review (APPROVE / COMMENT / REQUEST_CHANGES).
  # Fails the job if the AI requests changes — informational gate.
  # ---------------------------------------------------------------------------
  ai-code-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements-ai-review.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-review.txt

      - name: Run AI code review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
        run: python scripts/ai-review.py --mode review

  # ---------------------------------------------------------------------------
  # Job 2: Security Scan
  # Focused OWASP-aware security audit of the PR diff.
  # Runs independently of the code review job (no `needs` dependency).
  # FAILS and BLOCKS MERGE on critical or high severity findings.
  # Add this job name to branch protection "Required status checks" to enforce.
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements-ai-review.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-review.txt

      - name: Run security scan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
        run: python scripts/ai-review.py --mode security
