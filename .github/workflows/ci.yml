name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Static analysis (fast feedback, no DB needed)
  # Runs type checking, linting, and format verification in parallel-friendly
  # steps. Fails the pipeline immediately if the code doesn't type-check or
  # violates style rules — no point running expensive tests on broken code.
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # Job 2 — Tests + coverage gate
  # Only runs after static analysis passes (needs: lint-and-typecheck).
  # Enforces the coverage thresholds defined in vitest.config.ts.
  # Uploads the HTML coverage report as a build artifact for review.
  # ---------------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3 — Dependency audit (runs independently of job 2)
  # Does not need test results — it scans the lockfile directly.
  # Fails on high or critical severity vulnerabilities.
  # Running independently means a vulnerable dependency surfaces even when
  # tests are broken.
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit for vulnerabilities
        run: npm audit --audit-level=high
