name: Eval Harness

on:
  push:
    branches: ["**"]
    paths:
      - "evals/**"
      - "scripts/ainsd_fixtures/**"
      - ".github/workflows/evals.yml"
  pull_request:
    paths:
      - "evals/**"
      - "scripts/ainsd_fixtures/**"
      - ".github/workflows/evals.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Run the judge on the v1 (baseline) outputs.
  # The pipeline is considered healthy if pass rate >= 90%.
  # This is the gate that would run against freshly generated outputs in a
  # real deployment pipeline.
  # ---------------------------------------------------------------------------
  eval-baseline:
    name: Eval — v1 baseline (must pass ≥90%)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: evals/requirements.txt

      - name: Install dependencies
        run: pip install -r evals/requirements.txt

      - name: Run judge on v1 outputs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python evals/judge.py \
            --golden  evals/golden.jsonl \
            --output  evals/output_v1.jsonl \
            --report-out evals/report_v1.json \
            --fail-under 90

      - name: Upload v1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-v1
          path: evals/report_v1.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Run the judge on the v2 (planted-regression) outputs.
  # This job does NOT fail CI — it demonstrates regression detection.
  # The step that verifies regressions were caught DOES fail if the harness
  # misses all regressions (pass rate equals v1's rate), because that means
  # the rubric is too loose to catch quality drops.
  # ---------------------------------------------------------------------------
  eval-regression-detection:
    name: Eval — v2 regression detection
    runs-on: ubuntu-latest
    needs: eval-baseline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: evals/requirements.txt

      - name: Install dependencies
        run: pip install -r evals/requirements.txt

      - name: Run judge on v2 outputs (regression set)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python evals/judge.py \
            --golden  evals/golden.jsonl \
            --output  scripts/ainsd_fixtures/evals_planted_regression/output_v2.jsonl \
            --report-out evals/report_v2.json

      - name: Verify regressions were detected
        run: |
          python3 - <<'EOF'
          import json, sys

          v1 = json.loads(open("evals/report_v1.json").read())
          v2 = json.loads(open("evals/report_v2.json").read())

          v1_rate = v1["summary"]["pass_rate_pct"]
          v2_rate = v2["summary"]["pass_rate_pct"]
          regressions = v2["regressions"]

          print(f"v1 pass rate: {v1_rate}%")
          print(f"v2 pass rate: {v2_rate}%")
          print(f"Regressions flagged: {[r['id'] for r in regressions]}")

          if v2_rate >= v1_rate:
              print("FAIL: harness did not detect any regressions — rubric is too loose", file=sys.stderr)
              sys.exit(1)

          if len(regressions) == 0:
              print("FAIL: no regressions named in v2 report", file=sys.stderr)
              sys.exit(1)

          print(f"OK: harness detected {len(regressions)} regression(s), "
                f"v2 pass rate dropped {v1_rate - v2_rate:.1f}pp vs v1")
          EOF

      - name: Upload v2 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-v2
          path: evals/report_v2.json
          retention-days: 30
